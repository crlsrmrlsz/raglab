# GraphRAG Entity and Relationship Types
# Optimized for dual-domain corpus: Neuroscience (8 books) + Philosophy/Wisdom (11 books)
#
# Design Principles:
# 1. Types constrain extraction for consistency (vs open-ended discovery)
# 2. Domain-specific types enable precise query matching
# 3. Bridge types (COGNITIVE_PROCESS, EMOTION, BEHAVIOR) enable cross-domain retrieval
# 4. Avoid overlapping types (e.g., PERSON vs RESEARCHER vs PHILOSOPHER)
#
# Usage:
#   from src.graph.graphrag_types import load_entity_types, load_relationship_types
#   entity_types = load_entity_types()  # Returns list of type names
#
# Reference: Microsoft GraphRAG uses 4 defaults (organization, person, geo, event)
# This corpus needs 20 types due to dual-domain nature and technical vocabulary

metadata:
  version: "1.0"
  created: "2026-01-23"
  corpus: "neuroscience + philosophy/wisdom (19 books)"
  total_entity_types: 20
  total_relationship_types: 15

# =============================================================================
# ENTITY TYPES (20 total)
# =============================================================================

entity_types:
  # ---------------------------------------------------------------------------
  # NEUROSCIENCE-PRIMARY (10 types)
  # ---------------------------------------------------------------------------

  - name: BRAIN_REGION
    domain: neuroscience
    description: "Anatomical regions of the brain with distinct functions"
    examples:
      - amygdala
      - prefrontal cortex
      - hippocampus
      - thalamus
      - hypothalamus
      - ventral tegmental area (VTA)
      - nucleus accumbens
      - limbic system
      - basal ganglia
      - anterior cingulate cortex
    query_patterns:
      - "What does the X do?"
      - "How does X affect behavior?"
      - "What happens when X is damaged?"

  - name: NEURAL_STRUCTURE
    domain: neuroscience
    description: "Cellular and anatomical components of the nervous system"
    examples:
      - neuron
      - synapse
      - axon
      - dendrite
      - glia
      - cortex
      - neural circuit
      - white matter
      - gray matter
      - myelin
    query_patterns:
      - "How do neurons communicate?"
      - "What is the structure of X?"

  - name: NEUROTRANSMITTER
    domain: neuroscience
    description: "Chemical messengers that transmit signals between neurons"
    examples:
      - dopamine
      - serotonin
      - norepinephrine
      - GABA
      - glutamate
      - acetylcholine
      - endorphins
      - oxytocin (when acting as neurotransmitter)
    query_patterns:
      - "What does dopamine do?"
      - "How does X affect mood?"

  - name: HORMONE
    domain: neuroscience
    description: "Chemical messengers released into bloodstream affecting distant organs"
    examples:
      - cortisol
      - testosterone
      - estrogen
      - adrenaline (epinephrine)
      - oxytocin (when acting as hormone)
      - insulin
      - melatonin
    query_patterns:
      - "How does stress affect hormones?"
      - "What role does cortisol play?"

  - name: COGNITIVE_PROCESS
    domain: shared
    description: "Mental operations and functions of the mind"
    examples:
      - memory
      - attention
      - consciousness
      - decision-making
      - learning
      - perception
      - reasoning
      - executive function
      - working memory
      - metacognition
    query_patterns:
      - "How does memory work?"
      - "What affects attention?"
    notes: "Bridge type - appears in both neuroscience and philosophy contexts"

  - name: BEHAVIOR
    domain: shared
    description: "Observable actions and patterns of conduct"
    examples:
      - aggression
      - addiction
      - empathy
      - sleep
      - motivation
      - procrastination
      - altruism
      - cooperation
      - self-control
    query_patterns:
      - "Why do people X?"
      - "What causes aggressive behavior?"
    notes: "Bridge type - connects neural mechanisms to human experience"

  - name: EMOTION
    domain: shared
    description: "Affective states and feelings"
    examples:
      - fear
      - pleasure
      - reward
      - anxiety
      - stress
      - anger
      - joy
      - suffering
      - tranquility
    query_patterns:
      - "What causes fear?"
      - "How is pleasure processed?"
    notes: "Bridge type - central to both limbic system and Stoic philosophy"

  - name: DISORDER
    domain: neuroscience
    description: "Mental health conditions and neurological disorders"
    examples:
      - PTSD
      - depression
      - schizophrenia
      - anxiety disorder
      - addiction
      - bipolar disorder
      - autism
      - ADHD
    query_patterns:
      - "What causes PTSD?"
      - "How does depression affect the brain?"

  - name: RESEARCHER
    domain: neuroscience
    description: "Scientists who conducted studies or proposed theories"
    examples:
      - Robert Sapolsky
      - Daniel Kahneman
      - Michael Gazzaniga
      - David Eagleman
      - Benjamin Libet
      - John-Dylan Haynes
      - Paul MacLean
      - Antonio Damasio
    query_patterns:
      - "What did Sapolsky discover?"
      - "According to Kahneman..."

  - name: STUDY
    domain: neuroscience
    description: "Scientific experiments and research findings"
    examples:
      - Libet's experiment
      - split-brain research
      - fMRI studies
      - Milgram experiment
      - Stanford prison experiment
      - Wellesley effect study
    query_patterns:
      - "What did the X study show?"
      - "What evidence supports Y?"

  # ---------------------------------------------------------------------------
  # PHILOSOPHY-PRIMARY (10 types)
  # ---------------------------------------------------------------------------

  - name: PHILOSOPHER
    domain: philosophy
    description: "Thinkers whose ideas and teachings are analyzed"
    examples:
      - Arthur Schopenhauer
      - Seneca
      - Epictetus
      - Marcus Aurelius
      - Lao Tzu
      - Confucius
      - Baltasar Gracian
      - Plato
      - Kant
      - Hegel
    query_patterns:
      - "What did Schopenhauer believe about X?"
      - "According to Seneca..."

  - name: PHILOSOPHICAL_SCHOOL
    domain: philosophy
    description: "Traditions and schools of philosophical thought"
    examples:
      - Stoicism
      - Taoism
      - Confucianism
      - Pessimism
      - Epicureanism
      - Buddhism
      - Platonism
      - German Idealism
    query_patterns:
      - "What do Stoics believe about X?"
      - "How does Taoism differ from..."

  - name: WORK
    domain: philosophy
    description: "Philosophical texts and literary works"
    examples:
      - Meditations
      - Enchiridion
      - Tao Te Ching
      - Analects
      - Essays and Aphorisms
      - Letters from a Stoic
      - The World as Will and Idea
      - Thinking Fast and Slow
    query_patterns:
      - "What does the Enchiridion say about X?"
      - "In the Meditations..."

  - name: PRINCIPLE
    domain: philosophy
    description: "Core teachings and actionable philosophical doctrines"
    examples:
      - wu wei (non-action)
      - acceptance of fate
      - denial of will
      - dichotomy of control
      - amor fati
      - memento mori
      - ataraxia (tranquility)
      - apatheia (freedom from passion)
    query_patterns:
      - "What is wu wei?"
      - "How do I apply the dichotomy of control?"

  - name: VIRTUE
    domain: philosophy
    description: "Moral excellences and ethical ideals"
    examples:
      - courage
      - temperance
      - wisdom
      - justice
      - benevolence (ren)
      - self-control
      - prudence
      - filial piety
      - integrity
    query_patterns:
      - "What is the Stoic view of courage?"
      - "How does Confucius define virtue?"

  - name: ETHICAL_CONCEPT
    domain: philosophy
    description: "Ideas related to morality, good/evil, and right conduct"
    examples:
      - happiness
      - virtue
      - justice
      - duty
      - good
      - evil
      - moral responsibility
      - free will (ethical context)
    query_patterns:
      - "What is true happiness according to X?"
      - "Is there such thing as evil?"

  - name: METAPHYSICAL_CONCEPT
    domain: philosophy
    description: "Abstract ontological and existential ideas"
    examples:
      - will to live
      - thing-in-itself (noumenon)
      - phenomena
      - Tao (the Way)
      - soul
      - consciousness (philosophical)
      - being
      - maya (illusion)
    query_patterns:
      - "What is Schopenhauer's concept of will?"
      - "What is the Tao?"

  - name: PSYCHOLOGICAL_CONCEPT
    domain: shared
    description: "Ideas about mind, motivation, and mental life"
    examples:
      - desire
      - self-control
      - fear
      - motivation
      - habit
      - System 1 / System 2
      - cognitive bias
      - heuristic
    query_patterns:
      - "Why do we struggle with self-control?"
      - "What drives human motivation?"
    notes: "Bridge type - connects neuroscience findings to philosophical analysis"

  - name: HISTORICAL_FIGURE
    domain: philosophy
    description: "Non-philosophers referenced as examples in texts"
    examples:
      - Nero
      - Socrates
      - Cato
      - Alexander the Great
      - Pompey
      - Goethe
      - Hitler
    query_patterns:
      - "What example does Seneca give about Nero?"

  - name: PRACTICE
    domain: philosophy
    description: "Applied techniques and exercises for living well"
    examples:
      - meditation
      - self-examination
      - contemplation
      - journaling
      - voluntary discomfort
      - negative visualization
      - morning reflection
      - evening review
    query_patterns:
      - "How do I practice Stoicism?"
      - "What exercises does Epictetus recommend?"

# =============================================================================
# RELATIONSHIP TYPES (15 total)
# =============================================================================

relationship_types:
  # Causal relationships
  - name: CAUSES
    description: "Direct causal relationship (X causes Y)"
    examples:
      - "dopamine CAUSES pleasure"
      - "stress CAUSES cortisol release"

  - name: INFLUENCES
    description: "Indirect effect (X influences Y without direct causation)"
    examples:
      - "childhood INFLUENCES adult behavior"
      - "culture INFLUENCES moral judgment"

  - name: INHIBITS
    description: "Suppresses or reduces activity (X inhibits Y)"
    examples:
      - "prefrontal cortex INHIBITS amygdala"
      - "GABA INHIBITS neural activity"

  - name: ACTIVATES
    description: "Triggers or increases activity (X activates Y)"
    examples:
      - "fear ACTIVATES amygdala"
      - "reward ACTIVATES dopamine release"

  - name: MODULATES
    description: "Adjusts or regulates (X modulates Y)"
    examples:
      - "serotonin MODULATES mood"
      - "attention MODULATES perception"

  # Structural relationships
  - name: PART_OF
    description: "Component relationship (X is part of Y)"
    examples:
      - "hippocampus PART_OF limbic system"
      - "courage PART_OF virtue"

  - name: CONTAINS
    description: "Inclusion relationship (X contains Y)"
    examples:
      - "Stoicism CONTAINS acceptance of fate"
      - "prefrontal cortex CONTAINS dorsolateral PFC"

  - name: IS_A
    description: "Type/category relationship (X is a type of Y)"
    examples:
      - "dopamine IS_A neurotransmitter"
      - "Seneca IS_A Stoic philosopher"

  # Conceptual relationships
  - name: PROPOSES
    description: "Theoretical claim (person/school proposes idea)"
    examples:
      - "Schopenhauer PROPOSES will to live"
      - "Kahneman PROPOSES System 1/System 2"

  - name: STUDIES
    description: "Research focus (researcher studies topic)"
    examples:
      - "Sapolsky STUDIES stress"
      - "Gazzaniga STUDIES split-brain"

  - name: TEACHES
    description: "Philosophical instruction (philosopher teaches principle)"
    examples:
      - "Epictetus TEACHES dichotomy of control"
      - "Lao Tzu TEACHES wu wei"

  # Functional relationships
  - name: INVOLVED_IN
    description: "Participates in process (X involved in Y)"
    examples:
      - "hippocampus INVOLVED_IN memory"
      - "amygdala INVOLVED_IN fear"

  - name: ASSOCIATED_WITH
    description: "Correlation or connection (X associated with Y)"
    examples:
      - "low serotonin ASSOCIATED_WITH depression"
      - "virtue ASSOCIATED_WITH happiness"

  - name: REQUIRES
    description: "Dependency (X requires Y)"
    examples:
      - "self-control REQUIRES prefrontal cortex"
      - "wisdom REQUIRES experience"

  - name: CONTRASTS_WITH
    description: "Opposition or difference (X contrasts with Y)"
    examples:
      - "System 1 CONTRASTS_WITH System 2"
      - "Stoicism CONTRASTS_WITH Epicureanism"
