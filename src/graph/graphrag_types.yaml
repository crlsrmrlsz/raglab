# GraphRAG Entity Types
# Optimized for dual-domain corpus: Neuroscience (8 books) + Philosophy/Wisdom (11 books)
#
# Reference: Microsoft GraphRAG uses 4 defaults (organization, person, geo, event)
# This corpus needs 20 types due to dual-domain nature and technical vocabulary

entity_types:
  # Neuroscience-primary
  - BRAIN_REGION
  - NEURAL_STRUCTURE
  - NEUROTRANSMITTER
  - HORMONE
  - COGNITIVE_PROCESS
  - BEHAVIOR
  - EMOTION
  - DISORDER
  - RESEARCHER
  - STUDY
  # Philosophy-primary
  - PHILOSOPHER
  - PHILOSOPHICAL_SCHOOL
  - WORK
  - PRINCIPLE
  - VIRTUE
  - ETHICAL_CONCEPT
  - METAPHYSICAL_CONCEPT
  - PSYCHOLOGICAL_CONCEPT
  - HISTORICAL_FIGURE
  - PRACTICE
